<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Mystery Box</title>
  <link rel="stylesheet" href="style.css" />
   <!-- <link rel="stylesheet" href="style-new.css" /> -->
</head>
<body>
  <div id="overlay" style="display:none;">
    <div id="box">
      <div class="box-header">
          <img src="Os_logo_transparent_bg.gif" id="logo" alt="Logo">
          <h3 id="box-title">Mystery Box</h3>
      </div>
        <p id="box-desc">Open to receive your random reward!</p>
        <div id="spin">
            <div id="item-strip"></div>
            <div id="gold-bar"></div>
        </div>
          <button class ='btn' id="open-btn">Open Box</button>
          <button class ='btn' style="display:none;" id="close-btn">Close</button>
    </div>
  </div>
  <!-- <script src="script-new.js"></script> -->
  <script src="script.js"></script>
</body>
</html>
