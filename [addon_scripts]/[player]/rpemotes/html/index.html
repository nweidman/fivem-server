<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPEmotes Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="emote-menu" class="hidden">
        <div class="sidebar" id="sidebar"></div>

        <div class="menu-main">
            <div class="menu-header">
                <div class="drag-handle" id="drag-handle"></div>
                <div class="search-row">
                    <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
                            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <input type="text" id="search-input" autocomplete="off" spellcheck="false" />
                        <button id="search-clear" class="search-clear hidden" type="button">&times;</button>
                    </div>
                    <button id="close-btn" title="Close">&times;</button>
                </div>
            </div>

            <div class="category-title" id="category-title"></div>
            <div class="status-bar" id="status-bar"></div>

            <div class="content-area">
                <div class="content-scroll" id="content-scroll">
                    <div id="emote-grid" class="emote-grid"></div>
                </div>
            </div>
            <div class="menu-footer" id="menu-footer"></div>
        </div>

        <div id="keybind-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="keybind-modal-title"></h3>
                <div id="keybind-slots"></div>
                <button id="keybind-cancel" class="modal-cancel"></button>
            </div>
        </div>

        <div id="list-modal" class="modal hidden">
            <div class="modal-content list-modal-content">
                <div id="list-modal-form">
                    <div class="list-modal-header">
                        <div id="list-modal-icon" class="list-modal-icon">
                            <i class="fa-solid fa-folder"></i>
                        </div>
                        <h3 id="list-modal-title"></h3>
                    </div>
                    <input type="text" id="list-name-input" class="list-name-input" maxlength="20" autocomplete="off" spellcheck="false" />
                    <div id="list-color-picker" class="color-picker"></div>
                    <div class="list-modal-actions">
                        <button id="list-cancel-btn" class="list-btn list-btn-cancel"></button>
                        <button id="list-save-btn" class="list-btn list-btn-save"></button>
                    </div>
                    <button id="list-delete-btn" class="list-btn-delete hidden"></button>
                </div>
                <div id="list-confirm-delete" class="list-confirm hidden">
                    <div class="list-confirm-icon">
                        <i class="fa-solid fa-trash"></i>
                    </div>
                    <p class="list-confirm-title" id="list-confirm-title"></p>
                    <p class="list-confirm-msg" id="list-confirm-msg"></p>
                    <div class="list-modal-actions">
                        <button id="list-confirm-back" class="list-btn list-btn-cancel"></button>
                        <button id="list-confirm-yes" class="list-btn list-btn-danger"></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast-container" aria-live="polite"></div>
    </div>

    <script src="js/nui.js"></script>
    <script src="js/store.js"></script>
    <script src="js/search.js"></script>
    <script src="js/smoothScroll.js"></script>
    <script src="js/emoteList.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
