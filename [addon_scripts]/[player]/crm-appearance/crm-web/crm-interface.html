<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA--comp-atible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"/>
        <title>crm-appearance</title>
        <link rel="stylesheet" href="nui://crm-core/crm-web/crm-styles/crm-main.css">
        <link rel="stylesheet" href="./crm-styles/crm-style.css"> 
    </head>
    <body>
        <div id="crm-interface">
            <div id="crm-appearance">
                <div id="crm-main"></div>
                <div class="crm-right">
                    <div class="crm-infos">
                        <div class="crm-info crm-details" crm-toggle="0"><i class="fa-solid fa-question"></i></div>
                        <div class="crm-info crm-camera"><i class="fa-solid fa-camera"></i></div>
                        <div class="crm-info crm-spotlight"><i class="fa-solid fa-lightbulb"></i></div>
                        <div class="crm-info crm-drag"><i class="fa-solid fa-hand"></i></div>
                        <div class="crm-info crm-wardrobe"><i class="fa-solid fa-shirt"></i></div>
                    </div>
                </div>
                <div class="crm-rotate"></div>
                <div id="crm-details"></div>
            </div>
            <div id="crm-outfits"></div>
        </div>
        <script src="./crm-scripts/crm-script.js"></script>
        <script src="./crm-scripts/crm-ui.js"></script>
        <script src="./crm-scripts/crm-build.js"></script>
        <script src="./crm-scripts/crm-outfits.js"></script>
    </body>
</html>
